# LazyCat Application Manifest
# Generated from Docker Compose configuration

name: NowenReader
package: community.lazycat.app.nowen-reader
version: 1.0.0
min_os_version: 1.3.8
description: "Lightweight, local-first manga/doujinshi management and reading platform"
license: MIT
homepage: https://github.com/cropflre/nowen-reader
author: cropflre

application:
  subdomain: nowen-reader
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://nowen-reader:3000/

services:
  nowen-reader:
    # cropflre/nowen-reader:v1.0.0
    image: registry.lazycat.cloud/czyt/cropflre/nowen-reader:53ff4c452950cb94
    environment:
      - GIN_MODE=release
      - DATABASE_URL=/data/nowen-reader.db
      - COMICS_DIR=/app/comics
      - DATA_DIR=/app/.cache
      - PORT=3000
      - TZ=Asia/Shanghai
    binds:
      - /lzcapp/var/data:/data
      - /lzcapp/cache/nowen:/app/.cache
      - /lzcapp/var/comics:/app/comics

locales:
  en:
    name: "Nowen Reader"
    description: "Lightweight, local-first manga/doujinshi management and reading platform. Build your personal manga library with smart metadata management."
  zh:
    name: "Nowen Reader"
    description: "轻量开源、本地化优先的漫画/同人志管理与阅读一体化工具。聚焦本地漫画资源的归档整理、元数据智能管理与沉浸式阅读，打造私域、可控、高效的个人漫画图书馆。"
